# GoReleaser configuration for rebar CLI
# Builds multi-platform binaries with version injection via ldflags

version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: rebar
    main: ./cli
    binary: rebar
    ldflags:
      - -s -w
      - -X github.com/willackerly/rebar/cli/cmd.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: rebar
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE*
      - README*
      - CLAUDE.md
      - bin/install
      - templates/**/*
      - scripts/**/*
      - agents/**/*

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: ttschampel
    name: rebar
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} {{.Version}}"
